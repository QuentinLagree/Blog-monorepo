<h1>Login Page</h1>

<form [formGroup]="form">
  <app-input
    [control]="usernameControl"
    [configuration]="{
  label: 'Nom',
  placeholder: 'Entrez votre nom',
  required: true,
  type: 'text'
}"
  />

  <app-input-email
    [control]="emailControl"
    [configuration]="{
  label: 'Adresse Email',
  placeholder: 'Entrez votre adresse email',
  required: true,
  type: 'email'
}"
  />

  <app-input-password
    [control]="passwordControl"
    [configuration]="{
  label: 'Mot de passe',
  placeholder: 'Entrez votre mot de passe',
  required: true,
  type: 'password',
  showPassword: true,
  displayStrenghMeterPassword: true,
}"
  />

  <app-input-password
    [control]="passwordConfirmControl"
    [configuration]="{
  label: 'Confirmation Mot de passe',
  placeholder: 'Entrez de nouveau votre mot de passe',
  required: true,
  type: 'password',
}"
  />

  <app-button-submit (clicked)="submit()"></app-button-submit>
</form>

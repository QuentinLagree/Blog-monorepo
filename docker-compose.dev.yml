services:
  db:
    image: mysql:8.0
    container_name: blog-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: blog
      # (optionnel) jeu de caractères conseillé
      # MYSQL_INITDB_SKIP_TZINFO: 1
    ports:
      - "3307:3306"
    command:
      [
        "mysqld",
        "--character-set-server=utf8mb4",
        "--collation-server=utf8mb4_unicode_ci",
      ]
    volumes:
      - mysqldata:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -proot || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    container_name: blog-api
    working_dir: /app
    env_file:
      - ./api/.env
    environment:
      CI: "true"
      DATABASE_URL: mysql://root:root@db:3306/blog
      NODE_ENV: development
      PNPM_STORE_DIR: /pnpm/store
      REDIS_URL: redis://redis:6379/0
      # 🔥 Forcer le polling côté Nest (chokidar)
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "700"
      # utile pour watchpack si présent
      WATCHPACK_POLLING: "true"
      
    ports:
      - "3000:3000"
    volumes:
      - ./api:/app
      - pnpm-store:/pnpm/store
      - /app/node_modules
      - /app/.pnpm
      - ./api/secret-key:/app/secret-key:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -lc "
        pnpm -v &&
        pnpm install --frozen-lockfile || pnpm install &&
        pnpm run prisma:build &&
        pnpm run prisma:generate &&
        pnpm run prisma:migrate &&
        pnpm run prisma:seed &&
        pnpm run start:dev
      "
    develop:
      watch:
        - action: sync
          path: ./api
          target: /app
          ignore:
            - node_modules/
            - dist/
        - action: rebuild
          path: ./api/Dockerfile.dev

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    container_name: blog-web
    working_dir: /app
    environment:
      CI: "true"
      NODE_ENV: development
      PNPM_STORE_DIR: /pnpm/store
      # 🔥 Polling Angular / Vite / Webpack
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "700"
      WATCHPACK_POLLING: "true"
    ports:
      - "4200:4200"
    volumes:
      - ./web:/app
      - pnpm-store:/pnpm/store
      - /app/node_modules
      - /app/.pnpm
    command: >
      sh -lc "
        pnpm -v &&
        pnpm install --frozen-lockfile || pnpm install &&
        pnpm exec ng version &&
        pnpm run start
      "
    develop:
      watch:
        - action: sync
          path: ./web
          target: /app
          ignore:
            - node_modules/
            - dist/
        - action: rebuild
          path: ./web/Dockerfile.dev

  redis:
    image: redis:7-alpine
    container_name: blog-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -h localhost ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 20

# --- Interface graphique RedisInsight ---
  redisinsight:
    image: redis/redisinsight:latest
    container_name: blog-redisinsight
    ports:
      - "5540:5540" # UI web
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDISINSIGHT_SERVER_PORT=5540
    volumes:
      - redisinsightdata:/data

volumes:
  pnpm-store:
  mysqldata:
  redisdata:
  redisinsightdata:

<div class="flex frow-center">
  <div class="main-container-form p-5">
  <h1>Ravis de te revoir !</h1>
  <form [formGroup]="form" class="stack gap-4 pt-5">
    

    <app-input-email [control]="emailControl" [configuration]="{
  label: 'Adresse Email',
  placeholder: 'Entrez votre adresse email',
  required: true,
  type: 'email'
}" />

    <app-input-password [control]="passwordControl" [configuration]="{
  label: 'Mot de passe',
  placeholder: 'Entrez votre mot de passe',
  required: true,
  type: 'password',
  showPassword: true,
}" />
    <app-button (clicked)="submit()" class="full" size="lg" [label]="loading ? 'Connection en cours...' : 'Se connecter'" [disabled]="!form.valid" [loading]="loading"></app-button>
  </form>
  <p class="main-container-form-link">Vous n'avez pas de compte ? <a href="auth/register">Inscris-toi</a>.</p>
</div>
</div>

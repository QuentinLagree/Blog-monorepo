<div class="flex frow-center">
    <div class="main-container-form p-5">
        <h1>Ravis de te revoir !</h1>
        <form [formGroup]="form" class="grid gap-4 pt-5">


            <app-input [control]="firstnameControl" [configuration]="{
  label: 'Prénom',
  placeholder: 'Entrez votre prénom',
  required: true,
  type: 'text'
}" />
            <app-input [control]="lastnameControl" [configuration]="{
  label: 'Nom de famille',
  placeholder: 'Entrez votre nom de famille',
  required: true,
  type: 'text'
}" />


            <app-input [control]="pseudoControl" [configuration]="{
  label: 'Pseudo',
  placeholder: 'Entrez votre pseudonyme',
  required: true,
  type: 'text'
}" />

            <app-input-email [control]="emailControl" [configuration]="{
  label: 'Adresse Email',
  placeholder: 'Entrez votre adresse email',
  required: true,
  type: 'email'
}" />

            <app-input-password [control]="passwordControl" [configuration]="{
  label: 'Mot de passe',
  placeholder: 'Entrez votre mot de passe.',
  required: true,
  type: 'password',
  showPassword: true,
  displayStrenghMeterPassword: true
    
}" />
<app-input-password [control]="confirmPasswordControl" [configuration]="{
  label: 'Confirmation du Mot de passe',
  placeholder: 'Entrez de nouveau votre mot de passe.',
  required: true,
  type: 'password',
    
}" />

            <app-button (clicked)="submit()" class="full" size="lg" [loading]="loading" [label]="loading ? 'Inscription en cours...' : 'S\'inscrire'"
                [disabled]="!form.valid"></app-button>
        </form>
        <p class="main-container-form-link">Tu as déjà un compte ?  <a href="auth/login">Connecte-toi</a>.</p>
    </div>
</div>
